name: Deploy AS games hub (github.io/as)

# Julkaisee `dist-as`-buildin repoon joniwinsten-lab/as (GitHub Pages).
# Vaatii: repo `as`, Pages lähteenä main / (root). Salainen AS_SITE_DEPLOY_TOKEN (PAT → as-repo).
# Deploy ajetaan vain tästä upstream-reposta (forkit ohittavat).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-as-hub
  cancel-in-progress: true

jobs:
  build-as-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Build AS hub (base /as/)
        run: npm run build:gh-pages-as
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist-as
          path: dist-as

  deploy-as-hub:
    needs: build-as-hub
    if: github.repository == 'joniwinsten-lab/suguru'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-as
          path: dist-as

      - name: README (mukana deployissa)
        run: |
          printf '%s\n' \
            '# as' \
            '' \
            'Staattinen pelisivu: **Sanuli** ja **AS Daily life**.' \
            '' \
            '→ https://joniwinsten-lab.github.io/as/' \
            '' \
            'Lähdekoodi: https://github.com/joniwinsten-lab/suguru' \
            > dist-as/README.md

      # Ulkoiseen repoon: PAT (ei GITHUB_TOKEN). Ei suguru-checkoutia → ei worktree-ristiriitaa `main`-haaran kanssa.
      - name: Push dist-as → joniwinsten-lab/as (main)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.AS_SITE_DEPLOY_TOKEN }}
          external_repository: joniwinsten-lab/as
          publish_branch: main
          publish_dir: ./dist-as
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
